services:
  postgres:
    image: postgres:16-alpine
    container_name: voting-upb-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: voting
      POSTGRES_PASSWORD: voting
      POSTGRES_DB: voting_upb
    ports:
      - '5432:5432'
    volumes:
      - voting_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U voting -d voting_upb']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  voting_pg_data:
