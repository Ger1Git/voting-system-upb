services:
  contracts:
    build:
      context: ./contracts
    container_name: voting-upb-contracts
    restart: unless-stopped
    ports:
      - '8545:8545'
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"const net=require('net');const s=net.connect(8545,'127.0.0.1',()=>{s.end();process.exit(0)});s.on('error',()=>process.exit(1));\"",
        ]
      interval: 5s
      timeout: 5s
      retries: 20

  postgres:
    image: postgres:16-alpine
    container_name: voting-upb-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: voting
      POSTGRES_PASSWORD: voting
      POSTGRES_DB: voting_upb
    ports:
      - '5432:5432'
    volumes:
      - voting_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U voting -d voting_upb']
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: voting-upb-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      contracts:
        condition: service_healthy
    environment:
      PORT: 5122
      NODE_ENV: development
      JWT_SECRET: change-me-in-production
      JWT_EXPIRES_IN: 1h
      VOTER_ID_SALT: upb-voting-salt-change-me
      ENROLLMENT_SOURCE: database
      DATABASE_URL: postgresql://voting:voting@postgres:5432/voting_upb
      AUTO_SEED_ON_START: 'true'
      ADMIN_EMAIL: admin@upb.ro
      ADMIN_PASSWORD: admin
      BLOCKCHAIN_RPC_URL: http://contracts:8545
      VOTING_CONTRACT_ADDRESS: 0x5FbDB2315678afecb367f032d93F642f64180aa3
      ORACLE_PRIVATE_KEY: 0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80
      REQUIRE_FACE_VERIFICATION: 'true'
      FACE_VERIFICATION_MAX_AGE_SEC: '120'
    ports:
      - '5122:5122'

  frontend:
    build:
      context: ./frontend
    container_name: voting-upb-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
    environment:
      VITE_API_BASE_URL: http://localhost:5122/api
    ports:
      - '5173:5173'

volumes:
  voting_pg_data:
